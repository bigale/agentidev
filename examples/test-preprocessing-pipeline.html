<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test 2-Stage Preprocessing Pipeline</title>
  <style>
    body {
      font-family: 'Monaco', 'Courier New', monospace;
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px;
      background: #1a202c;
      color: #e2e8f0;
    }
    h1 {
      color: #4fd1c5;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #a0aec0;
      margin-bottom: 32px;
    }
    .pipeline-flow {
      background: #2d3748;
      padding: 20px;
      margin: 20px 0;
      border-radius: 8px;
      border-left: 4px solid #4fd1c5;
    }
    .pipeline-flow h3 {
      margin-top: 0;
      color: #63b3ed;
    }
    .test-case {
      background: #2d3748;
      padding: 20px;
      margin: 20px 0;
      border-radius: 8px;
      border-left: 4px solid #4fd1c5;
    }
    .test-case h3 {
      margin-top: 0;
      color: #63b3ed;
    }
    .section {
      margin: 16px 0;
    }
    .label {
      color: #4fd1c5;
      font-weight: 600;
      margin-bottom: 8px;
    }
    pre {
      background: #1a202c;
      color: #e2e8f0;
      padding: 12px;
      border-radius: 4px;
      overflow-x: auto;
      border: 1px solid #4a5568;
      margin: 8px 0;
    }
    .success {
      border-left-color: #48bb78;
    }
    .success .label {
      color: #48bb78;
    }
    .error {
      border-left-color: #f56565;
    }
    .error .label {
      color: #f56565;
    }
    .error pre {
      color: #fc8181;
    }
    button {
      background: #4fd1c5;
      color: #1a202c;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin: 8px 8px 8px 0;
    }
    button:hover {
      background: #38b2ac;
    }
    .status {
      padding: 12px;
      border-radius: 4px;
      margin: 16px 0;
      font-weight: 600;
    }
    .status.ready {
      background: #2f855a;
      color: #c6f6d5;
    }
    .status.loading {
      background: #744210;
      color: #fbd38d;
    }
    .status.error {
      background: #742a2a;
      color: #fed7d7;
    }
    .stage {
      background: #1a202c;
      padding: 16px;
      border-radius: 8px;
      border: 2px solid #4a5568;
      margin: 12px 0;
    }
    .stage-title {
      color: #81e6d9;
      font-weight: 600;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <h1>🔬 2-Stage Preprocessing Pipeline Test</h1>
  <div class="subtitle">Stage 1: Strip Scripts/Styles → Stage 2: Remove Angle Brackets</div>

  <div id="status" class="status loading">Loading rustixml WASM and grammars...</div>

  <div class="pipeline-flow">
    <h3>Pipeline Architecture</h3>
    <pre>
Input HTML
    ↓
[Stage 1] Strip &lt;script&gt; and &lt;style&gt; blocks
    ↓
[Stage 2] Remove &lt; and &gt; angle brackets
    ↓
Linearized Output
    </pre>
  </div>

  <button onclick="runAllTests()">▶ Run All Tests</button>
  <button onclick="runSingleTest(0)">Test 1: Simple Div</button>
  <button onclick="runSingleTest(3)">Test 4: Script Removal</button>

  <div id="results"></div>

  <script type="module">
    import init, { parse_ixml } from '../extension/pkg/rustixml.js';

    const testCases = [
      {
        name: "Test 1: Simple Div",
        input: '<div class="container">Hello World</div>',
        expected: 'div class="container" Hello World / div'
      },
      {
        name: "Test 2: Nested Elements",
        input: '<div class="outer"><span id="inner">Text</span></div>',
        expected: 'div class="outer" span id="inner" Text / span / div'
      },
      {
        name: "Test 3: Void Element (Input)",
        input: '<input type="text" name="username" placeholder="Enter name">',
        expected: 'input type="text" name="username" placeholder="Enter name"'
      },
      {
        name: "Test 4: Script Tag Removal",
        input: '<div>Before<script>alert("evil");<\/script>After</div>',
        expected: 'div Before After / div'
      },
      {
        name: "Test 5: Style Tag Removal",
        input: '<div>Content<style>.foo { color: red; }<\/style>More</div>',
        expected: 'div Content More / div'
      },
      {
        name: "Test 6: Line Break",
        input: '<div>Hello<br>World</div>',
        expected: 'div Hello br World / div'
      },
      {
        name: "Test 7: Form with Inputs",
        input: '<form action="/submit"><label>Name:</label><input type="text"><input type="submit" value="Go"></form>',
        expected: 'form action="/submit" label Name: / label input type="text" input type="submit" value="Go" / form'
      },
      {
        name: "Test 8: Image",
        input: '<img src="photo.jpg" alt="My Photo" width="300">',
        expected: 'img src="photo.jpg" alt="My Photo" width="300"'
      }
    ];

    let wasmReady = false;
    let stage1Grammar = '';
    let stage2Grammar = '';

    // Initialize WASM
    init().then(async () => {
      wasmReady = true;
      console.log('[Pipeline Test] rustixml initialized');

      // Load both grammars
      try {
        const [stage1Response, stage2Response] = await Promise.all([
          fetch('./preprocessing-stage1-strip-scripts.ixml'),
          fetch('./preprocessing-stage2-remove-brackets.ixml')
        ]);

        stage1Grammar = await stage1Response.text();
        stage2Grammar = await stage2Response.text();

        console.log('[Pipeline Test] Stage 1 grammar loaded:', stage1Grammar.length, 'bytes');
        console.log('[Pipeline Test] Stage 2 grammar loaded:', stage2Grammar.length, 'bytes');

        document.getElementById('status').className = 'status ready';
        document.getElementById('status').textContent = '✓ Pipeline ready to test';
      } catch (error) {
        console.error('[Pipeline Test] Failed to load grammars:', error);
        document.getElementById('status').className = 'status error';
        document.getElementById('status').textContent = '✗ Failed to load grammars: ' + error.message;
      }
    }).catch(err => {
      console.error('[Pipeline Test] WASM init failed:', err);
      document.getElementById('status').className = 'status error';
      document.getElementById('status').textContent = '✗ WASM initialization failed';
    });

    function parseWithGrammar(grammar, input) {
      if (!wasmReady) {
        return { success: false, error: 'WASM not ready' };
      }
      if (!grammar) {
        return { success: false, error: 'Grammar not loaded' };
      }

      try {
        const result = parse_ixml(grammar, input);
        if (result.success) {
          return { success: true, xml: result.output };
        } else {
          return { success: false, error: result.error || 'Parse failed' };
        }
      } catch (error) {
        return { success: false, error: error.message };
      }
    }

    function extractTextFromXml(xmlString) {
      const textOnly = xmlString
        .replace(/<\?xml[^>]*\?>/g, '')
        .replace(/<[^>]+>/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
      return textOnly;
    }

    function runPipeline(input) {
      // Stage 1: Strip scripts and styles
      const stage1Result = parseWithGrammar(stage1Grammar, input);
      if (!stage1Result.success) {
        return {
          success: false,
          error: 'Stage 1 failed: ' + stage1Result.error,
          stage1: stage1Result
        };
      }

      const stage1Output = extractTextFromXml(stage1Result.xml);
      console.log('[Pipeline] Stage 1 output:', stage1Output);

      // Stage 2: Remove angle brackets
      const stage2Result = parseWithGrammar(stage2Grammar, stage1Output);
      if (!stage2Result.success) {
        return {
          success: false,
          error: 'Stage 2 failed: ' + stage2Result.error,
          stage1: stage1Result,
          stage1Output: stage1Output,
          stage2: stage2Result
        };
      }

      const stage2Output = extractTextFromXml(stage2Result.xml);
      console.log('[Pipeline] Stage 2 output:', stage2Output);

      return {
        success: true,
        stage1: stage1Result,
        stage1Output: stage1Output,
        stage2: stage2Result,
        stage2Output: stage2Output,
        finalOutput: stage2Output
      };
    }

    function runTest(testCase, index) {
      console.log(`[Test ${index + 1}] Running:`, testCase.name);

      const pipelineResult = runPipeline(testCase.input);

      const testDiv = document.createElement('div');
      testDiv.className = 'test-case ' + (pipelineResult.success ? 'success' : 'error');

      let html = `<h3>${testCase.name}</h3>`;

      html += `<div class="section">
        <div class="label">Input HTML:</div>
        <pre>${escapeHtml(testCase.input)}</pre>
      </div>`;

      if (pipelineResult.stage1) {
        html += `<div class="stage">
          <div class="stage-title">Stage 1: Strip Scripts/Styles</div>
          ${pipelineResult.stage1.success ?
            `<div class="label">✓ Success</div>
             <pre>${escapeHtml(pipelineResult.stage1Output)}</pre>` :
            `<div class="label">✗ Failed</div>
             <pre>${escapeHtml(pipelineResult.stage1.error)}</pre>`
          }
        </div>`;
      }

      if (pipelineResult.stage2) {
        html += `<div class="stage">
          <div class="stage-title">Stage 2: Remove Angle Brackets</div>
          ${pipelineResult.stage2.success ?
            `<div class="label">✓ Success</div>
             <pre>${escapeHtml(pipelineResult.stage2Output)}</pre>` :
            `<div class="label">✗ Failed</div>
             <pre>${escapeHtml(pipelineResult.stage2.error)}</pre>`
          }
        </div>`;
      }

      if (pipelineResult.success) {
        const matches = pipelineResult.finalOutput === testCase.expected;
        html += `<div class="section">
          <div class="label">Expected:</div>
          <pre>${escapeHtml(testCase.expected)}</pre>
        </div>`;
        html += `<div class="section">
          <div class="label">Match: ${matches ? '✓ PASS' : '✗ FAIL'}</div>
        </div>`;
        console.log(`[Test ${index + 1}] ${matches ? 'PASS' : 'FAIL'}`);
      } else {
        html += `<div class="section">
          <div class="label">✗ Pipeline Failed</div>
          <pre>${escapeHtml(pipelineResult.error)}</pre>
        </div>`;
        console.error(`[Test ${index + 1}] FAIL:`, pipelineResult.error);
      }

      testDiv.innerHTML = html;
      return testDiv;
    }

    window.runAllTests = function() {
      console.log('[Pipeline Test] Running all tests...');
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '';

      testCases.forEach((testCase, index) => {
        const resultDiv = runTest(testCase, index);
        resultsDiv.appendChild(resultDiv);
      });
    };

    window.runSingleTest = function(index) {
      console.log(`[Pipeline Test] Running test ${index + 1}...`);
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '';

      const resultDiv = runTest(testCases[index], index);
      resultsDiv.appendChild(resultDiv);
    };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
