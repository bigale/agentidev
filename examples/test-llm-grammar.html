<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test LLM Instructions Grammar</title>
  <style>
    body {
      font-family: 'Monaco', 'Courier New', monospace;
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
      background: #1a202c;
      color: #e2e8f0;
    }
    h1 {
      color: #4fd1c5;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #a0aec0;
      margin-bottom: 32px;
    }
    .test-case {
      background: #2d3748;
      padding: 20px;
      margin: 20px 0;
      border-radius: 8px;
      border-left: 4px solid #4fd1c5;
    }
    .test-case.success {
      border-left-color: #48bb78;
    }
    .test-case.error {
      border-left-color: #f56565;
    }
    .test-case h3 {
      margin-top: 0;
      color: #63b3ed;
    }
    .section {
      margin: 16px 0;
    }
    .label {
      color: #4fd1c5;
      font-weight: 600;
      margin-bottom: 8px;
    }
    pre {
      background: #1a202c;
      color: #e2e8f0;
      padding: 12px;
      border-radius: 4px;
      overflow-x: auto;
      border: 1px solid #4a5568;
      margin: 8px 0;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    button {
      background: #4fd1c5;
      color: #1a202c;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin: 8px 8px 8px 0;
    }
    button:hover {
      background: #38b2ac;
    }
    .status {
      padding: 12px;
      border-radius: 4px;
      margin: 16px 0;
      font-weight: 600;
    }
    .status.ready {
      background: #2f855a;
      color: #c6f6d5;
    }
    .status.loading {
      background: #744210;
      color: #fbd38d;
    }
    .status.error {
      background: #742a2a;
      color: #fed7d7;
    }
  </style>
</head>
<body>
  <h1>🤖 LLM Instructions Grammar Test</h1>
  <div class="subtitle">Linearized HTML → LLM-Friendly Instructions</div>

  <div id="status" class="status loading">Loading...</div>

  <button onclick="testSimpleForm()">Test Simple Form</button>
  <button onclick="testLoginForm()">Test Login Form</button>

  <div id="results"></div>

  <script type="module">
    import init, { parse_ixml } from '../extension/pkg/rustixml.js';
    import { preprocess } from './html-preprocessor.js';

    let wasmReady = false;
    let grammar = '';

    // Initialize
    init().then(async () => {
      wasmReady = true;
      console.log('[LLM Grammar Test] rustixml initialized');

      // Load grammar
      try {
        const response = await fetch('./form-structure.ixml');
        grammar = await response.text();
        console.log('[LLM Grammar Test] Grammar loaded:', grammar.length, 'bytes');

        document.getElementById('status').className = 'status ready';
        document.getElementById('status').textContent = '✓ Ready to test';
      } catch (error) {
        console.error('[LLM Grammar Test] Failed to load grammar:', error);
        document.getElementById('status').className = 'status error';
        document.getElementById('status').textContent = '✗ Failed to load grammar: ' + error.message;
      }
    }).catch(err => {
      console.error('[LLM Grammar Test] WASM init failed:', err);
      document.getElementById('status').className = 'status error';
      document.getElementById('status').textContent = '✗ WASM initialization failed';
    });

    function parseWithGrammar(input) {
      if (!wasmReady || !grammar) {
        return { success: false, error: 'Not ready' };
      }

      try {
        const result = parse_ixml(grammar, input);
        if (result.success) {
          return { success: true, xml: result.output };
        } else {
          return { success: false, error: result.error || 'Parse failed' };
        }
      } catch (error) {
        return { success: false, error: error.message };
      }
    }

    function runTest(name, html) {
      console.log('[Test]', name);

      // Step 1: Preprocess
      const linearized = preprocess(html);
      console.log('[Test] Linearized:', linearized);

      // Step 2: Parse with grammar
      const parseResult = parseWithGrammar(linearized);

      // Display results
      const testDiv = document.createElement('div');
      testDiv.className = 'test-case ' + (parseResult.success ? 'success' : 'error');

      let htmlContent = `<h3>${name}</h3>`;

      htmlContent += `<div class="section">
        <div class="label">Original HTML:</div>
        <pre>${escapeHtml(html)}</pre>
      </div>`;

      htmlContent += `<div class="section">
        <div class="label">Linearized (after preprocessing):</div>
        <pre>${escapeHtml(linearized)}</pre>
      </div>`;

      if (parseResult.success) {
        htmlContent += `<div class="section">
          <div class="label">✓ Parse Successful</div>
          <div class="label">XML Output:</div>
          <pre>${escapeHtml(parseResult.xml)}</pre>
        </div>`;
      } else {
        htmlContent += `<div class="section">
          <div class="label">✗ Parse Failed</div>
          <pre>${escapeHtml(parseResult.error)}</pre>
        </div>`;
      }

      testDiv.innerHTML = htmlContent;

      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '';
      resultsDiv.appendChild(testDiv);
    }

    window.testSimpleForm = function() {
      const html = '<form action="/submit"><label>Name:</label><input type="text" name="name"></form>';
      runTest('Simple Form', html);
    };

    window.testLoginForm = function() {
      const html = '<form action="/login"><label>Email:</label><input type="email" name="email"><label>Password:</label><input type="password" name="pwd"><input type="submit" value="Login"></form>';
      runTest('Login Form', html);
    };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
