<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SmartClient — Agentidev</title>
  <link rel="stylesheet" href="../lib/agentiface/tokens.css">
  <link rel="stylesheet" href="../lib/agentiface/overrides.css">
  <link rel="stylesheet" href="../lib/agentiface/animations.css">
  <link rel="stylesheet" href="../lib/agentiface/container-queries.css">
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; box-sizing: border-box; background-color: var(--af-surface-primary, #ffffff); }
  </style>
</head>
<body>

<h1 class="sr-only" style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0;">SmartClient UI Generator</h1>

<!-- Sandbox shims: cookie/localStorage/sessionStorage blocked without allow-same-origin -->
<script>
  Object.defineProperty(document, 'cookie', {
    get: function() { return ''; }, set: function() {}, configurable: true
  });

  // In-memory Storage polyfill for sandbox
  (function() {
    function FakeStorage() { this._data = {}; }
    FakeStorage.prototype.getItem = function(k) { return this._data.hasOwnProperty(k) ? this._data[k] : null; };
    FakeStorage.prototype.setItem = function(k, v) { this._data[k] = String(v); };
    FakeStorage.prototype.removeItem = function(k) { delete this._data[k]; };
    FakeStorage.prototype.clear = function() { this._data = {}; };
    FakeStorage.prototype.key = function(i) { return Object.keys(this._data)[i] || null; };
    Object.defineProperty(FakeStorage.prototype, 'length', {
      get: function() { return Object.keys(this._data).length; }
    });

    try { localStorage.getItem('_'); } catch(e) {
      Object.defineProperty(window, 'localStorage', { value: new FakeStorage(), configurable: true });
    }
    try { sessionStorage.getItem('_'); } catch(e) {
      Object.defineProperty(window, 'sessionStorage', { value: new FakeStorage(), configurable: true });
    }
  })();

  // chrome-extension:// not in SmartClient's default protocolURLs — without it,
  // getProtocol() returns "" and combineURLs() treats all extension URLs as relative
  window.isc_protocolURLs = ["http://","https://","file://","mailto:","app-resource:","data:","chrome-extension://"];
</script>

<!-- Save native constructors that SmartClient clobbers in Simple Names mode -->
<script>window._nativeDataView = window.DataView;</script>

<!-- SmartClient isomorphic dir -->
<script>window.isomorphicDir = "../smartclient/";</script>

<!-- Core modules (order matters) -->
<script src="../smartclient/system/modules/ISC_Core.js"></script>
<script src="../smartclient/system/modules/ISC_Foundation.js"></script>
<script src="../smartclient/system/modules/ISC_Containers.js"></script>
<script src="../smartclient/system/modules/ISC_Grids.js"></script>
<script src="../smartclient/system/modules/ISC_Forms.js"></script>
<script src="../smartclient/system/modules/ISC_DataBinding.js"></script>

<!-- Dynamic skin loading from ?skin param (defaults to Tahoe) -->
<script>
  var _skinName = new URLSearchParams(window.location.search).get('skin') || 'Tahoe';
  document.write('<script src="../smartclient/skins/' + _skinName + '/load_skin.js"><\/script>');
</script>

<!-- Check that SmartClient loaded (missing on fresh clones without SDK) -->
<script>
if (typeof isc === 'undefined') {
  document.addEventListener('DOMContentLoaded', function() {
    document.body.style.background = '#1a1a2e';
    document.body.style.color = '#ccc';
    document.body.style.fontFamily = '-apple-system, BlinkMacSystemFont, sans-serif';
    document.body.style.padding = '40px';
    document.body.style.overflow = 'auto';
    document.body.innerHTML = '<div style="max-width:600px;margin:0 auto;">'
      + '<h1 style="color:#4fc3f7;margin-bottom:8px;">Agentidev Dashboard</h1>'
      + '<h2 style="color:#f44336;font-weight:normal;">Setup Required</h2>'
      + '<p>The Forge toolkit (agentidev UI components) is not linked. The SmartClient runtime is bundled in the repo, but Forge needs a directory junction/symlink.</p>'
      + '<h3 style="color:#4fc3f7;">Quick Setup</h3>'
      + '<pre style="background:#0d1117;padding:12px;border-radius:6px;overflow-x:auto;font-size:13px;color:#e6edf3;">node scripts/setup.mjs</pre>'
      + '<h3 style="color:#4fc3f7;">Manual Setup</h3>'
      + '<p><b>Forge toolkit</b> (extension/lib/agentiface)</p>'
      + '<pre style="background:#0d1117;padding:12px;border-radius:6px;font-size:12px;color:#e6edf3;">'
      + '# Linux/macOS:\nln -sf ../../packages/forge extension/lib/agentiface\n\n'
      + '# Windows (no admin needed — uses junction):\nmklink /J extension\\lib\\agentiface ..\\..\\packages\\forge</pre>'
      + '<p style="color:#888;margin-top:24px;">After setup, reload the extension (chrome://extensions > reload icon).</p>'
      + '</div>';
  });
}
</script>

<!-- Agentiface theme + components -->
<script src="../lib/agentiface/theme-manager.js"></script>
<script src="../lib/agentiface/forge-listgrid.js"></script>
<script src="../lib/agentiface/forge-toast.js"></script>
<script src="../lib/agentiface/forge-wizard.js"></script>
<script src="../lib/agentiface/forge-filter-bar.js"></script>
<script src="../lib/agentiface/forge-a11y.js"></script>
<script src="../lib/agentiface/forge-registry.js"></script>

<!-- Config inspector (pure logic, no SC dependency) -->
<script src="inspector.js"></script>

<!-- Templates (bundled starters + template manager) -->
<script src="templates.js"></script>

<!-- AI renderer (before app.js so functions are available) -->
<script src="renderer.js"></script>

<!-- Inspector UI (SC components, after renderer.js and forge-registry.js) -->
<script src="inspector-ui.js"></script>

<!-- App logic -->
<script src="app.js"></script>

<!-- Host Capability Interface (must load before anything that calls window.Host) -->
<script src="../lib/host/host-interface.js"></script>
<!-- Runtime implementations must load before host-chrome-extension.js so the
     factory can auto-register them. Each runtime attaches to window.
     Composed runtimes (bsh on cheerpj, etc.) must load AFTER their deps
     so dependsOn lookups succeed at register time. -->
<script src="../lib/host/runtimes/cheerpj.js"></script>
<script src="../lib/host/runtimes/cheerpx.js"></script>
<script src="../lib/host/runtimes/bsh.js"></script>
<script src="../lib/host/host-chrome-extension.js"></script>

<!-- Dashboard mode (SC-4) -->
<script src="dashboard-config.js"></script>
<!-- Portlet modules (load before dashboard-app.js — order matches dashboard/load-order.txt) -->
<script src="dashboard/shared.js"></script>
<script src="dashboard/layout.js"></script>
<script src="dashboard/broadcast.js"></script>
<script src="dashboard/help.js"></script>
<script src="dashboard/auth-capture.js"></script>
<script src="dashboard/session-record.js"></script>
<script src="dashboard/toolbar.js"></script>
<script src="dashboard/sessions.js"></script>
<script src="dashboard/schedules.js"></script>
<script src="dashboard/run-plans.js"></script>
<script src="dashboard/recipe.js"></script>
<script src="dashboard/artifacts.js"></script>
<script src="dashboard/script-history.js"></script>
<script src="dashboard/scripts.js"></script>
<script src="dashboard/monaco.js"></script>
<script src="dashboard/test-results.js"></script>
<script src="dashboard-app.js"></script>

<!-- Initialize Agentiface theme (after all SC components loaded) -->
<script>Agentiface.ThemeManager.init('light');</script>

</body>
</html>
