<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Contextual Recall</title>
  <style>
    body {
      width: 400px;
      min-height: 500px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 16px 0;
    }

    #query-input {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 12px;
      box-sizing: border-box;
    }

    #search-button {
      width: 100%;
      padding: 12px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    #search-button:hover {
      background: #0052a3;
    }

    #results {
      margin-top: 16px;
    }

    .result-item {
      padding: 12px;
      border: 1px solid #eee;
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
    }

    .result-item:hover {
      background: #f5f5f5;
    }

    .result-title {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .result-snippet {
      font-size: 13px;
      color: #666;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #999;
    }

    .stats {
      font-size: 12px;
      color: #999;
      padding: 8px;
      background: #f9f9f9;
      border-radius: 4px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <h1>🧠 Contextual Recall</h1>

  <input
    type="text"
    id="query-input"
    placeholder="What were you working on last Tuesday?"
    autofocus
  />

  <button id="search-button">Search</button>

  <div id="results"></div>

  <div class="stats" id="stats">
    Loading statistics...
  </div>

  <script src="popup.js"></script>
</body>
</html>
