<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Contextual Recall</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fafafa;
    }

    header {
      padding: 16px;
      background: white;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 12px;
      color: #202124;
    }

    .search-box {
      position: relative;
    }

    #query-input {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #f8f9fa;
    }

    #query-input:focus {
      outline: none;
      border-color: #1a73e8;
      background: white;
    }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    #results {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .result-item {
      padding: 12px;
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .result-item:hover {
      border-color: #1a73e8;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .result-title {
      font-weight: 600;
      margin-bottom: 6px;
      color: #1a73e8;
      font-size: 14px;
    }

    .result-url {
      font-size: 12px;
      color: #5f6368;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-snippet {
      font-size: 13px;
      color: #3c4043;
      line-height: 1.5;
    }

    .result-meta {
      font-size: 11px;
      color: #70757a;
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
    }

    .loading {
      text-align: center;
      padding: 32px;
      color: #70757a;
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #70757a;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty-state-text {
      font-size: 14px;
      line-height: 1.6;
    }

    footer {
      padding: 12px 16px;
      background: white;
      border-top: 1px solid #e0e0e0;
      flex-shrink: 0;
    }

    .stats {
      font-size: 12px;
      color: #70757a;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .filters {
      padding: 12px 16px;
      background: white;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .filter-chip {
      padding: 6px 12px;
      background: #f1f3f4;
      border: none;
      border-radius: 16px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-chip:hover {
      background: #e8eaed;
    }

    .filter-chip.active {
      background: #1a73e8;
      color: white;
    }

    .settings-button {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .settings-button:hover {
      opacity: 1;
    }
  </style>
</head>
<body>
  <header>
    <h1>🧠 Contextual Recall</h1>
    <button class="settings-button" id="settings-button" title="Settings">⚙️</button>
    <div class="search-box">
      <input
        type="text"
        id="query-input"
        placeholder="Search your browsing history..."
        autofocus
      />
    </div>
  </header>

  <div class="filters" id="filters">
    <button class="filter-chip active" data-filter="all">All</button>
    <button class="filter-chip" data-filter="today">Today</button>
    <button class="filter-chip" data-filter="week">This Week</button>
    <button class="filter-chip" data-filter="specs">Specs</button>
    <button class="filter-chip" data-filter="docs">Docs</button>
    <button class="filter-chip" data-filter="dashboards">Dashboards</button>
  </div>

  <main>
    <div id="results">
      <div class="empty-state">
        <div class="empty-state-icon">🔍</div>
        <div class="empty-state-text">
          Search your browsing history semantically.<br>
          Try: "What was that spec I looked at yesterday?"<br>
          Or: "Show me dashboards about sales metrics"
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="stats" id="stats">
      <div class="stat-item">📊 <span id="pages-indexed">0</span> pages</div>
      <div class="stat-item">💾 <span id="storage-used">0 MB</span></div>
      <div class="stat-item">🔍 <span id="queries-today">0</span> queries</div>
    </div>
  </footer>

  <script src="sidepanel.js"></script>
</body>
</html>
